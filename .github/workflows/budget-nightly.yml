name: Budget Nightly Automation

on:
  schedule:
    - cron: '30 12 * * *'  # 7:30 AM CT
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-all-workflow:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Execute Complete Budget Workflow
        run: |
          echo "Starting complete budget workflow..."
          RESPONSE=$(curl -s -w "\n%{http_code}" --location --request POST 'https://us-central1-budgetcalendar-e6538.cloudfunctions.net/runAll' \
          --header 'Content-Type: application/json' \
          --data '{}' \
          --max-time 600)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response Body: $BODY"

          # Only 200 means all steps succeeded — 207 means partial failure
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Budget workflow completed successfully"
          else
            echo "❌ Budget workflow failed or had partial failures (HTTP $HTTP_CODE)"
            echo "Response: $BODY"
            exit 1
          fi

  notify-failure:
    needs: [run-all-workflow]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Log failure to AdminPanel
        env:
          BACKUP_LOG_KEY: ${{ secrets.BACKUP_LOG_KEY }}
        run: |
          curl -s -X POST https://admin.theespeys.com/.netlify/functions/backup-log \
            -H "Content-Type: application/json" \
            -H "x-api-key: $BACKUP_LOG_KEY" \
            -d '{"runType":"nightly-automation","scriptName":"budget-nightly.yml","status":"failure","message":"BudgetCalendar nightly automation failed — check GitHub Actions log and Firebase Functions console"}'
